<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu - Smoky Curve</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0a0a0a;
      color: white;
    }

    h2 {
      padding-left: 20px;
    }

    #search {
      width: 90%;
      margin: 20px;
      padding: 15px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    .menu-category {
      margin: 15px;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
    }

    .menu-title {
      padding: 15px;
      background: #ff4d4d;
      cursor: pointer;
      font-weight: bold;
    }

    .menu-items {
      padding: 10px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      align-items: center;
    }

    .item img {
      width: 80px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
      margin-right: 10px;
    }

    .item-info {
      flex: 1;
    }

    .item h4 {
      margin: 0;
    }

    .item p {
      margin: 3px 0;
      font-size: 13px;
      opacity: 0.7;
    }

    button {
      background: #ff4d4d;
      border: none;
      padding: 6px 12px;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    #cart-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #ff4d4d;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h2>🍽️ Our Menu</h2>
  <input type="text" id="search" placeholder="🔍 Search food...">

  <!-- SOUPS -->
  <div class="menu-category">
    <div class="menu-title">🥣 Soups</div>
    <div class="menu-items">
      <div class="item">
        <img src="smoky-curve-images/Clear_Chicken_Soup.webp" alt="Clear Chicken Soup">
        <div class="item-info">
          <h4 class="food-name">Clear Chicken Soup</h4>
          <p>Light chicken broth</p>
        </div>
        <div>
          ₹229 <br>
          <button onclick="addToCart('Clear Chicken Soup',229)">Add</button>
        </div>
      </div>
      <div class="item">
        <img src="smoky-curve-images/Cream_Of_Mushroom.webp" alt="Cream Of Mushroom">
        <div class="item-info">
          <h4 class="food-name">Cream Of Mushroom</h4>
          <p>Rich creamy soup</p>
        </div>
        <div>
          ₹199 <br>
          <button onclick="addToCart('Cream Of Mushroom',199)">Add</button>
        </div>
      </div>
      <div class="item">
        <img src="smoky-curve-images/Hot_Sour_Veg.webp" alt="Hot & Sour Veg">
        <div class="item-info">
          <h4 class="food-name">Hot & Sour Veg</h4>
          <p>Spicy tangy soup</p>
        </div>
        <div>
          ₹189 <br>
          <button onclick="addToCart('Hot & Sour Veg',189)">Add</button>
        </div>
      </div>
    </div>
  </div>

  <!-- STARTERS -->
  <div class="menu-category">
    <div class="menu-title">🍗 Starters</div>
    <div class="menu-items">
      <div class="item">
        <img src="smoky-curve-images/Chicken_65.webp" alt="Chicken 65">
        <div class="item-info">
          <h4 class="food-name">Chicken 65</h4>
        </div>
        <div>
          ₹359 <br><button onclick="addToCart('Chicken 65',359)">Add</button>
        </div>
      </div>
      <div class="item">
        <img src="smoky-curve-images/Paneer_Tikka.webp" alt="Paneer Tikka">
        <div class="item-info">
          <h4 class="food-name">Paneer Tikka</h4>
        </div>
        <div>
          ₹329 <br><button onclick="addToCart('Paneer Tikka',329)">Add</button>
        </div>
      </div>
      <div class="item">
        <img src="smoky-curve-images/Tandoori_Fish.webp" alt="Tandoori Fish">
        <div class="item-info">
          <h4 class="food-name">Tandoori Fish</h4>
        </div>
        <div>
          ₹489 <br><button onclick="addToCart('Tandoori Fish',489)">Add</button>
        </div>
      </div>
    </div>
  </div>

  <!-- CART BAR -->
  <div id="cart-bar">
    🛒 <span id="cart-count">0</span> items | ₹<span id="cart-total">0</span>
  </div>

  <script src="script.js"></script>
</body>
</html>
