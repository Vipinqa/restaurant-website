<!DOCTYPE html>
<html>
<head>
  <title>Menu - Smoky Curve</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0a0a0a;
      color: white;
    }

    h2 {
      padding-left: 20px;
    }

    /* SEARCH */
    #search {
      width: 90%;
      margin: 20px;
      padding: 15px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    /* MENU */
    .menu-category {
      margin: 15px;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
    }

    .menu-title {
      padding: 15px;
      background: #ff4d4d;
      cursor: pointer;
      font-weight: bold;
    }

    .menu-items {
      padding: 10px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .item h4 {
      margin: 0;
    }

    .item p {
      margin: 3px 0;
      font-size: 13px;
      opacity: 0.7;
    }

    button {
      background: #ff4d4d;
      border: none;
      padding: 6px 12px;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    /* CART */
    #cart-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #ff4d4d;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>🍽️ Our Menu</h2>
<input type="text" id="search" placeholder="🔍 Search food...">

<!-- MENU WILL BE DYNAMICALLY LOADED HERE -->
<div id="menu-container"></div>

<!-- CART BAR -->
<div id="cart-bar">
  🛒 <span id="cart-count">0</span> items | ₹<span id="cart-total">0</span>
</div>

<!-- LINK TO SCRIPT.JS -->
<script src="script.js"></script>
</body>
</html>
