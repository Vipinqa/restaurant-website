<!DOCTYPE html>
<html>
<head>
  <title>Smoky Curve Restaurant</title>

  <!-- GOOGLE FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- AOS ANIMATION -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0a0a0a;
      color: white;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar a {
      color: white;
      margin: 10px;
      text-decoration: none;
      transition: 0.3s;
    }

    .navbar a:hover {
      color: #ff4d4d;
    }

    /* HERO */
    .hero {
      height: 100vh;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5), black),
      url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5');
      background-size: cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .hero h1 { font-size: 60px; }
    .hero p { opacity: 0.8; }

    .btn {
      margin-top: 20px;
      padding: 15px 30px;
      background: linear-gradient(45deg,#ff4d4d,#ff0000);
      border-radius: 30px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px red;
    }

    section { padding: 70px 40px; }
    h2 { border-left: 5px solid #ff4d4d; padding-left: 10px; }

    /* MENU GRID */
    #menu-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
      gap: 25px;
      margin-top: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      overflow: hidden;
      backdrop-filter: blur(10px);
      transition: 0.3s;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content { padding: 15px; }
    .price { color: #ff4d4d; font-weight: bold; }
    .rating { font-size: 14px; opacity: 0.7; margin-bottom: 10px; }

    .add-btn {
      background: #ff4d4d;
      border: none;
      padding: 8px 15px;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    /* STICKY CART BAR */
    #cart-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #ff4d4d;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      z-index: 1000;
    }

    /* SEARCH */
    #search {
      width: 90%;
      margin: 20px auto;
      display: block;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div><b>Smoky Curve 🔥</b></div>
  <div>
    <a href="#">Home</a>
    <a href="#menu">Menu</a>
    <a href="#reviews">Reviews</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1 data-aos="fade-up">Smoky Curve 🍽️</h1>
  <p data-aos="fade-up">Taste That You Will Never Forget</p>
  <a href="#menu" class="btn" data-aos="zoom-in">Explore Menu</a>
</div>

<!-- MENU -->
<section id="menu">
  <h2>🔥 Popular Dishes</h2>
  <input type="text" id="search" placeholder="🔍 Search food...">
  <div id="menu-container"></div>
</section>

<!-- REVIEWS -->
<section id="reviews">
  <h2>⭐ Customer Reviews</h2>
  <p data-aos="fade-right">"Amazing food and fast service!"</p>
  <p data-aos="fade-right">"Best shawarma in Chennai!"</p>
  <p data-aos="fade-right">"Affordable and tasty 😍"</p>
</section>

<!-- CONTACT -->
<section>
  <h2>📍 Visit Us</h2>
  <p>18, Paper Mills Road, Perambur</p>
  <p>📞 6365267431</p>

  <iframe 
    src="https://maps.google.com/maps?q=perambur&t=&z=15&ie=UTF8&iwloc=&output=embed"
    width="100%" height="250" style="border-radius:10px;">
  </iframe>
</section>

<!-- CART BAR -->
<div id="cart-bar">
  🛒 <span id="cart-count">0</span> items | ₹<span id="cart-total">0</span>
</div>

<!-- AOS SCRIPT -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init();
</script>

<!-- SCRIPT -->
<script>
// Menu Data
let cartCount = 0;
let total = 0;

const menuItems = [
  { name: "Chicken Shawarma", img: "https://raw.githubusercontent.com/Vipinqa/restaurant-website/main/smoky-curve-images/Chicken_Shawarma.webp", price: 120, rating: "⭐ 4.5 (120 reviews)" },
  { name: "Fried Rice", img: "https://raw.githubusercontent.com/Vipinqa/restaurant-website/main/smoky-curve-images/Fried%20Rice.webp", price: 150, rating: "⭐ 4.6" },
  { name: "Tandoori Chicken", img: "https://raw.githubusercontent.com/Vipinqa/restaurant-website/main/smoky-curve-images/Tandoori%20Chicken.webp", price: 220, rating: "⭐ 4.8" }
];

// Add to cart
function addToCart(name, price){
  cartCount++;
  total += price;
  document.getElementById("cart-count").innerText = cartCount;
  document.getElementById("cart-total").innerText = total;
}

// Render Menu
function renderMenu(){
  const container = document.getElementById("menu-container");
  container.innerHTML = "";
  menuItems.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${item.img}">
      <div class="card-content">
        <h3>${item.name}</h3>
        <p class="price">₹${item.price}</p>
        <p class="rating">${item.rating}</p>
        <button class="add-btn" onclick="addToCart('${item.name}',${item.price})">Add to Cart</button>
      </div>
    `;
    container.appendChild(card);
  });
}

// Search
document.getElementById("search").addEventListener("keyup", function(){
  const val = this.value.toLowerCase();
  document.querySelectorAll("#menu-container .card").forEach(card => {
    const name = card.querySelector("h3").innerText.toLowerCase();
    card.style.display = name.includes(val) ? "block" : "none";
  });
});

// Initialize
document.addEventListener("DOMContentLoaded", renderMenu);
</script>
</body>
</html>
